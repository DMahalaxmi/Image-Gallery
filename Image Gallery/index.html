<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>My Image Gallery</h1>

<div class="gallery">

    <img src="images/img1.jpg" onclick="openImage(this)">
    <img src="images/img2.jpg" onclick="openImage(this)">
    <img src="images/img3.jpg" onclick="openImage(this)">
    <img src="images/img4.jpg" onclick="openImage(this)">
    <img src="images/img5.jpg" onclick="openImage(this)">
    <img src="images/img6.jpg" onclick="openImage(this)">

</div>

<div class="lightbox" id="lightbox">

    <span class="close" onclick="closeImage()">&times;</span>

    <button class="prev" onclick="previousImage()">❮</button>

    <img id="lightboxImage">

    <button class="next" onclick="nextImage()">❯</button>

</div>

<script src="script.js"></script>

</body>
</html>
